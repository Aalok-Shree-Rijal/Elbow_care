<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <title>💪 ElbowCare Work Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon-192.png">
</head>
<body>

<nav id="nav">
  <div class="nav-brand">💪 ElbowCare</div>
  <div class="nav-links">
    <button class="nav-tab" id="nt-timer"     onclick="go('timer')">    <span class="icon">⏱</span>Timer</button>
    <button class="nav-tab" id="nt-dashboard" onclick="go('dashboard')"><span class="icon">📊</span>Dashboard</button>
    <button class="nav-tab" id="nt-exercises" onclick="go('exercises')"><span class="icon">🏃</span>Exercises</button>
  </div>
  <div class="user-menu-wrap" id="user-menu-wrap">
    <button class="user-pill" id="user-pill" onclick="toggleMenu(event)">
      <span>👤</span><span id="nav-username">—</span><span class="chev">▼</span>
    </button>
    <div class="user-drop" id="user-drop">
      <button class="drop-item" onclick="doExit()">↩ Exit <span class="drop-hint">stay logged in</span></button>
      <div class="drop-sep"></div>
      <button class="drop-item danger" onclick="doLogout()">🚪 Logout <span class="drop-hint">clear session</span></button>
    </div>
  </div>
</nav>

<div id="app"></div>

<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.log('SW failed:', err));
    });
  }
</script>
</body>
</html>
